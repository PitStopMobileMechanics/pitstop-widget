<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PitStop Mobile Mechanics — Book a Service</title>
<style>
  :root {
    --red: #E8231A;
    --red-dark: #C01A12;
    --navy: #0A1628;
    --navy-mid: #152238;
    --navy-light: #1E3050;
    --silver: #8A8F9A;
    --silver-light: #C8CDD6;
    --bg: #F4F6F9;
    --white: #FFFFFF;
    --border: #D8DCE6;
    --text: #1A1F2E;
    --text-muted: #5A6070;
    --text-light: #8A90A0;
    --success-bg: #EAF7EE;
    --success: #1A7A3A;
    --error-bg: #FEF0EF;
    --error: #C01A12;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .widget-wrap { max-width: 560px; margin: 0 auto; }
  .widget-header { background: var(--navy); border-radius: var(--radius) var(--radius) 0 0; padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 14px; }
  .logo-mark { display: flex; flex-direction: column; align-items: center; gap: 1px; flex-shrink: 0; }
  .logo-stars { display: flex; gap: 3px; margin-bottom: 2px; }
  .star { width: 8px; height: 8px; background: var(--silver-light); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
  .star.mid { background: var(--silver); width: 10px; height: 10px; }
  .logo-bar { background: var(--white); height: 2px; width: 60px; border-radius: 1px; }
  .logo-text-wrap { line-height: 1.1; }
  .logo-pitstop { font-size: 20px; font-weight: 800; color: var(--white); letter-spacing: .04em; text-transform: uppercase; }
  .logo-sub { font-size: 9px; font-weight: 700; color: var(--red); letter-spacing: .18em; text-transform: uppercase; }
  .header-tagline { margin-left: auto; font-size: 12px; color: var(--silver-light); text-align: right; line-height: 1.4; }
  .progress-bar { background: var(--navy-mid); padding: .75rem 1.5rem; display: flex; gap: 0; }
  .prog-step { flex: 1; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--silver); font-weight: 500; }
  .prog-step.active { color: var(--white); }
  .prog-step.done { color: var(--red); }
  .prog-num { width: 20px; height: 20px; border-radius: 50%; background: var(--navy-light); color: var(--silver); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .prog-step.active .prog-num { background: var(--red); color: var(--white); }
  .prog-step.done .prog-num { background: var(--red-dark); color: var(--white); }
  .prog-connector { width: 16px; height: 1px; background: var(--navy-light); margin: 0 4px; align-self: center; flex-shrink: 0; }
  .widget-body { background: var(--white); border-radius: 0 0 var(--radius) var(--radius); border: 1px solid var(--border); border-top: none; overflow: hidden; }
  .section { padding: 1.5rem; border-bottom: 1px solid var(--border); }
  .section:last-child { border-bottom: none; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .section-icon { width: 32px; height: 32px; border-radius: var(--radius-sm); background: var(--navy); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .section-icon svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .section-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .section-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
  input, select { width: 100%; height: 42px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 0 12px; font-size: 14px; color: var(--text); background: var(--white); outline: none; transition: border-color .15s; font-family: inherit; }
  input:focus, select:focus { border-color: var(--navy); }
  input::placeholder { color: var(--text-light); }
  .row { display: flex; gap: 10px; }
  .row > * { flex: 1; }
  .row .narrow { flex: 0 0 100px; }
  .btn-primary { width: 100%; height: 44px; background: var(--red); color: var(--white); border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; cursor: pointer; letter-spacing: .03em; transition: background .15s, transform .1s; font-family: inherit; }
  .btn-primary:hover { background: var(--red-dark); }
  .btn-primary:active { transform: scale(.98); }
  .btn-secondary { width: 100%; height: 44px; background: transparent; color: var(--navy); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s; font-family: inherit; }
  .btn-secondary:hover { background: var(--bg); }
  .zip-result { display: none; align-items: center; gap: 8px; margin-top: 10px; padding: 10px 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; }
  .zip-result.success { background: var(--success-bg); color: var(--success); border: 1px solid #B8E6C8; }
  .zip-result.error-msg { background: var(--error-bg); color: var(--error); border: 1px solid #F5C0BC; }
  .zip-result svg { width: 16px; height: 16px; flex-shrink: 0; }
  .section.locked { opacity: .4; pointer-events: none; }
  .locked-notice { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-light); margin-bottom: 12px; padding: 8px 10px; background: var(--bg); border-radius: var(--radius-sm); }
  .locked-notice svg { width: 13px; height: 13px; flex-shrink: 0; }
  .lookup-tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
  .ltab { flex: 1; height: 52px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: transparent; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 12px; font-weight: 600; color: var(--text-muted); transition: all .15s; font-family: inherit; }
  .ltab svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .ltab.active { border-color: var(--navy); background: var(--navy); color: var(--white); }
  .ltab:not(.active):hover { border-color: var(--navy); color: var(--navy); }
  .lookup-panel { display: none; }
  .lookup-panel.active { display: block; }
  .fallback-link { text-align: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed var(--border); }
  .fallback-btn { background: none; border: none; color: var(--navy); font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; font-family: inherit; display: inline-flex; align-items: center; gap: 5px; }
  .fallback-btn:hover { color: var(--red); }
  .fallback-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .manual-form { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .manual-form.open { display: block; }
  .form-row { margin-bottom: 12px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10, 22, 40, 0.72); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: var(--radius); width: 100%; max-width: 420px; overflow: hidden; animation: slideUp .2s ease; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { background: var(--navy); padding: 1.25rem 1.5rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .modal-header-text { flex: 1; }
  .modal-icon { width: 36px; height: 36px; background: rgba(232,35,26,.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; flex-shrink: 0; }
  .modal-icon svg { width: 18px; height: 18px; fill: none; stroke: var(--red); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
  .modal-sub { font-size: 12px; color: var(--silver-light); line-height: 1.5; }
  .modal-close { background: none; border: none; color: var(--silver-light); cursor: pointer; padding: 0; font-size: 20px; line-height: 1; flex-shrink: 0; }
  .modal-close:hover { color: var(--white); }
  .modal-body { padding: 1.25rem 1.5rem; }
  .modal-body .form-row { margin-bottom: 12px; }
  .modal-footer { padding: 0 1.5rem 1.25rem; display: flex; flex-direction: column; gap: 8px; }
  .success-state { display: none; text-align: center; padding: 2rem 1.5rem; }
  .success-state.show { display: block; }
  .success-icon { width: 56px; height: 56px; background: var(--success-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
  .success-icon svg { width: 24px; height: 24px; fill: none; stroke: var(--success); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .success-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .success-msg { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .form-fields { display: block; }
  .form-fields.hide { display: none; }
  input.err { border-color: var(--red); }
</style>
</head>
